<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxonHub 快速配置工具</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 js-yaml 用于解析 YAML 配置 -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased p-6 md:p-12 min-h-screen">
    <div class="max-w-7xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h1 class="text-3xl font-bold mb-8 text-gray-900">AxonHub 快速配置工具</h1>
        
        <!-- 双列输入布局 -->
        <div class="flex flex-col lg:flex-row gap-8 mb-6">
            
            <!-- 左侧：Channels 配置区域 -->
            <div class="flex-1 flex flex-col">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Channels 配置
                    <span class="text-gray-500 font-normal ml-2">(支持 YAML 或 CSV)</span>
                </label>
                <textarea id="channelInput" rows="16" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm transition-shadow resize-y" placeholder="支持 YAML:
- url: https://api.example.com
  keys: [sk-xxxxxx]
  type: claudecode

也支持 CSV (URL,apiKey[,name[,type[,tags]]]):
192.168.1.128:3000,sk-yyyyyy,localhost,zhipu_anthropic,公益站|claude"></textarea>
                
                <!-- 跨域代理设置区 (仅针对 Channels) -->
                <div class="mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                    <div class="flex items-center mb-2">
                        <input type="checkbox" id="useProxy" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="useProxy" class="ml-2 text-sm font-bold text-gray-800">启用 CORS 跨域代理 (仅针对直连遇到跨域拦截时)</label>
                    </div>
                    <div class="flex items-center mt-3">
                        <label class="text-sm text-gray-600 mr-3 whitespace-nowrap">代理地址:</label>
                        <input type="text" id="proxyUrl" value="" disabled class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm bg-gray-100" placeholder="例如: https://your-worker.workers.dev/?url=">
                    </div>
                    <p class="text-xs text-yellow-700 mt-2">
                        ⚠️ <b>安全提示</b>：API Key 会通过代理发送，请勿使用公共代理。请自建 Cloudflare Worker 作为代理（免费），或关闭此选项并使用浏览器的「Allow CORS」插件。
                    </p>
                </div>
            </div>

            <!-- 右侧：Models 和 API Keys 配置区域 -->
            <div class="flex-1 flex flex-col gap-6">
                <!-- Models 配置 -->
                <div class="flex flex-col">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Models 配置
                        <span class="text-gray-500 font-normal ml-2">(仅支持 YAML)</span>
                    </label>
                    <textarea id="modelInput" rows="12" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm transition-shadow resize-y" placeholder="providers:
  - deepseek
  - google
  - openai
  - anthropic
includes: 
  - gemini.*3|gemini-3,google
  - deepseek.*3\.[2-9]|deepseek.*3\.\d{2,},deepseek
excludes:
  - image
variants:
  - claude-opus-4.6,thinking"></textarea>
                </div>

                <!-- API Keys 配置 -->
                <div class="flex flex-col">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        API Keys 配置
                        <span class="text-gray-500 font-normal ml-2">(支持 YAML 或 CSV)</span>
                    </label>
                    <textarea id="apiKeyInput" rows="8" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm transition-shadow resize-y" placeholder="支持 YAML:
- name: opencode
  key: ah-b09cb09f55be265b275e8e1b4832c1eee36c6c358ecc9f6110c88d56f0ec24c7

也支持 CSV (name[,key]):
gemini
codex,ah-1234567890abcdef... (长度不足会自动重新生成)"></textarea>
                </div>
            </div>
        </div>

        <button id="convertBtn" class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 disabled:bg-blue-400 flex items-center justify-center font-medium transition-colors shadow-sm w-full md:w-auto">
            <svg id="loadingIcon" class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="btnText">开始转换</span>
        </button>

        <!-- 进度条 -->
        <div id="progressContainer" class="hidden mt-6">
            <div class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Channels 处理进度...</span>
                <span id="progressText">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- 实时日志面板 -->
        <div id="logContainer" class="hidden mt-6 p-4 bg-gray-900 rounded-lg shadow-inner">
            <div class="text-xs text-gray-400 mb-2 font-bold border-b border-gray-700 pb-1">实时运行日志</div>
            <ul id="logList" class="space-y-1 font-mono text-xs max-h-48 overflow-y-auto scroll-smooth"></ul>
        </div>

        <!-- 统计面板 -->
        <div id="summaryContainer" class="hidden mt-6 p-4 bg-blue-50 border-l-4 border-blue-500 text-blue-800 rounded-md flex flex-wrap gap-6 font-medium">
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>成功: <span id="successCount" class="ml-1 font-bold">0</span></div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span>失败: <span id="failCount" class="ml-1 font-bold">0</span></div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span>生成渠道数: <span id="channelCount" class="ml-1 font-bold">0</span></div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-purple-500 mr-2"></span>生成模型数: <span id="modelCount" class="ml-1 font-bold">0</span></div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>生成 API Keys: <span id="apiKeyCount" class="ml-1 font-bold">0</span></div>
        </div>

        <!-- 错误信息 -->
        <div id="errorContainer" class="hidden mt-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-md">
            <h3 class="font-bold mb-2">以下请求出现失败:</h3>
            <ul id="errorList" class="list-disc pl-5 space-y-1 text-sm max-h-40 overflow-y-auto"></ul>
        </div>

        <!-- 输出结果区域 (动态列布局) -->
        <div id="allOutputsContainer" class="hidden flex-col lg:flex-row gap-8 mt-8">
            <!-- AxonHub 输出 -->
            <div id="outputContainer" class="hidden flex-1 flex-col">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">AxonHub 配置</label>
                    <button id="copyBtn" class="bg-green-600 text-white px-4 py-1.5 rounded-md hover:bg-green-700 text-sm font-medium transition-colors shadow-sm">复制 JSON</button>
                </div>
                <textarea id="outputJson" rows="20" class="w-full p-4 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-green-500" readonly></textarea>
            </div>

            <!-- OpenCode 输出 -->
            <div id="opencodeOutputContainer" class="hidden flex-1 flex-col">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">OpenCode 配置</label>
                    <button id="copyOpencodeBtn" class="bg-purple-600 text-white px-4 py-1.5 rounded-md hover:bg-purple-700 text-sm font-medium transition-colors shadow-sm">复制 JSON</button>
                </div>
                <textarea id="opencodeOutputJson" rows="20" class="w-full p-4 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-purple-500" readonly></textarea>
            </div>

            <!-- Oh My OpenCode 输出 -->
            <div id="ohMyOpencodeOutputContainer" class="hidden flex-1 flex-col">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">Oh My OpenCode 配置</label>
                    <button id="copyOhMyOpencodeBtn" class="bg-indigo-600 text-white px-4 py-1.5 rounded-md hover:bg-indigo-700 text-sm font-medium transition-colors shadow-sm">复制 JSON</button>
                </div>
                <textarea id="ohMyOpencodeOutputJson" rows="20" class="w-full p-4 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // AxonHub 源码中的 Channel 后缀配置映射表
        const CHANNEL_SUFFIXES = {
            openai: '/v1',
            openai_responses: '/v1',
            codex: '/backend-api/codex#',
            antigravity: '',
            deepseek: '/v1',
            deepseek_anthropic: '/anthropic',
            deepinfra: '/v1/openai',
            anthropic: '',
            gemini_openai: '/v1beta/openai',
            gemini: '/v1beta',
            gemini_vertex: '/v1',
            minimax: '/v1',
            minimax_anthropic: '/anthropic',
            moonshot: '/v1',
            moonshot_anthropic: '/anthropic',
            zhipu: '/api/paas/v4',
            zai: '/api/paas/v4',
            zhipu_anthropic: '/api/anthropic',
            zai_anthropic: '/api/anthropic',
            doubao: '/api/v3',
            doubao_anthropic: '/api/compatible',
            vercel: '/v1',
            openrouter: '/api/v1',
            xiaomi: '/v1',
            xai: '/v1',
            longcat: '/openai/v1',
            longcat_anthropic: '/anthropic',
            ppio: '/openai/v1',
            siliconflow: '/v1',
            volcengine: '/api/v3',
            anthropic_fake: '/v1',
            openai_fake: '/v1',
            aihubmix: '/v1',
            burncloud: '/v1',
            modelscope: '/v1',
            bailian: '/compatible-mode/v1',
            anthropic_aws: '',
            anthropic_gcp: '',
            jina: '/v1',
            github: '/inference',
            claudecode: '/v1',
            cerebras: '/v1',
            nanogpt: '/api/v1'
        };

        // OpenCode Provider 映射配置表 (匹配官方格式)
        const OPENCODE_PROVIDER_MAP = {
            openai: { prefix: 'gpt', name: 'GPT', npm: '@ai-sdk/openai', url: 'http://localhost:8090/v1' },
            anthropic: { prefix: 'claude', name: 'Claude', npm: '@ai-sdk/anthropic', url: 'http://localhost:8090/anthropic/v1' },
            google: { prefix: 'gemini', name: 'Gemini', npm: '@ai-sdk/google', url: 'http://localhost:8090/gemini/v1beta' },
            zai: { prefix: 'glm', name: 'GLM', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            deepseek: { prefix: 'deepseek', name: 'DeepSeek', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            xai: { prefix: 'grok', name: 'Grok', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            moonshotai: { prefix: 'kimi', name: 'Kimi', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            minimax: { prefix: 'minimax', name: 'MiniMax', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            alibaba: { prefix: 'qwen', name: 'Qwen', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            doubao: { prefix: 'doubao', name: 'Doubao', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' },
            xiaomi: { prefix: 'xiaomi', name: 'Xiaomi', npm: '@ai-sdk/openai-compatible', url: 'http://localhost:8090/v1' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const channelInput = document.getElementById('channelInput');
            const modelInput = document.getElementById('modelInput');
            const apiKeyInput = document.getElementById('apiKeyInput');

            const convertBtn = document.getElementById('convertBtn');
            const loadingIcon = document.getElementById('loadingIcon');
            const btnText = document.getElementById('btnText');

            const useProxyCheckbox = document.getElementById('useProxy');
            const proxyUrlInput = document.getElementById('proxyUrl');

            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            const logContainer = document.getElementById('logContainer');
            const logList = document.getElementById('logList');

            const summaryContainer = document.getElementById('summaryContainer');
            const elSuccessCount = document.getElementById('successCount');
            const elFailCount = document.getElementById('failCount');
            const elChannelCount = document.getElementById('channelCount');
            const elModelCount = document.getElementById('modelCount');
            const elApiKeyCount = document.getElementById('apiKeyCount');

            const errorContainer = document.getElementById('errorContainer');
            const errorList = document.getElementById('errorList');

            const allOutputsContainer = document.getElementById('allOutputsContainer');
            const outputContainer = document.getElementById('outputContainer');
            const outputJson = document.getElementById('outputJson');
            const copyBtn = document.getElementById('copyBtn');

            const opencodeOutputContainer = document.getElementById('opencodeOutputContainer');
            const opencodeOutputJson = document.getElementById('opencodeOutputJson');
            const copyOpencodeBtn = document.getElementById('copyOpencodeBtn');

            const ohMyOpencodeOutputContainer = document.getElementById('ohMyOpencodeOutputContainer');
            const ohMyOpencodeOutputJson = document.getElementById('ohMyOpencodeOutputJson');
            const copyOhMyOpencodeBtn = document.getElementById('copyOhMyOpencodeBtn');

            useProxyCheckbox.addEventListener('change', (e) => {
                proxyUrlInput.disabled = !e.target.checked;
                proxyUrlInput.classList.toggle('bg-gray-100', !e.target.checked);
            });

            const addLog = (msg, type = 'info') => {
                const li = document.createElement('li');
                li.textContent = `> ${msg}`;
                if (type === 'warn') li.className = 'text-yellow-400';
                else if (type === 'error') li.className = 'text-red-400';
                else if (type === 'success') li.className = 'text-green-400';
                else li.className = 'text-gray-300';
                logList.appendChild(li);
                logList.scrollTop = logList.scrollHeight;
            };

            const getIsoTime = () => {
                const d = new Date();
                return d.toISOString().replace('Z', '000Z');
            };

            const extractName = (urlStr) => {
                try {
                    let url = urlStr.startsWith('http') ? new URL(urlStr) : new URL('https://' + urlStr);
                    let hostname = url.hostname;
                    const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
                    if (ipRegex.test(hostname)) return hostname;
                    let parts = hostname.split('.');
                    if (parts.length >= 2) return parts[parts.length - 2];
                    return hostname;
                } catch (e) {
                    return urlStr;
                }
            };

            // 生成严格的 64 位十六进制字符串
            const generateHex64 = () => {
                const array = new Uint8Array(32);
                window.crypto.getRandomValues(array);
                return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
            };

            // 格式化 API Key
            const formatApiKey = (inputKey) => {
                let cleanKey = (inputKey || '').trim();
                if (cleanKey.startsWith('ah-')) {
                    cleanKey = cleanKey.substring(3);
                }
                // 如果长度不等于 64，则重新生成
                if (cleanKey.length !== 64) {
                    cleanKey = generateHex64();
                }
                return `ah-${cleanKey}`;
            };

            // 解析 API Keys 文本 (支持 YAML 或 CSV)
            const parseApiKeysInput = (text) => {
                if (!text) return [];
                try {
                    const parsed = jsyaml.load(text);
                    if (typeof parsed === 'object' && parsed !== null) {
                        const arr = Array.isArray(parsed) ? parsed : (parsed.api_keys || []);
                        if (arr.length > 0) {
                            return arr.map(item => ({
                                name: String(item.name || 'default_key'),
                                key: String(item.key || '')
                            }));
                        }
                    }
                } catch (e) {
                    addLog(`API Keys YAML 解析失败，回退到 CSV 格式: ${e.message}`, 'warn');
                }

                // CSV 回退 (name[,key])
                const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
                return lines.map(line => {
                    const parts = line.split(',');
                    const name = parts[0]?.trim() || 'default_key';
                    const key = parts[1]?.trim() || '';
                    return { name, key };
                });
            };

            // 处理并生成最终的 API Keys 数组
            const processApiKeys = (configs) => {
                if (!configs || configs.length === 0) return [];
                const now = getIsoTime();

                return configs.map((config, index) => {
                    const finalKey = formatApiKey(config.key);
                    return {
                        id: index + 1,
                        created_at: now,
                        updated_at: now,
                        user_id: 1,
                        project_id: 1,
                        key: finalKey,
                        name: config.name,
                        type: "user",
                        status: "enabled",
                        scopes: [
                            "read_channels",
                            "write_requests"
                        ],
                        profiles: {
                            activeProfile: "",
                            profiles: null
                        },
                        edges: {
                            project: {
                                id: 1,
                                created_at: now,
                                updated_at: now,
                                name: "Default",
                                description: "Default project",
                                status: "active",
                                edges: {}
                            }
                        },
                        project_name: "Default"
                    };
                });
            };

            const parseChannelInput = (text) => {
                if (!text) return [];
                try {
                    const parsed = jsyaml.load(text);
                    if (typeof parsed === 'object' && parsed !== null) {
                        // 兼容直接给数组，或包裹在 channels: 下面
                        const arr = Array.isArray(parsed) ? parsed : (parsed.channels || []);
                        if (arr.length > 0) {
                            return arr.map(item => ({
                                url: String(item.url || ''),
                                keys: [].concat(item.keys || item.auth || item.apiKey || []),
                                name: item.name ? String(item.name) : '',
                                type: item.type ? String(item.type) : '',
                                tags: [].concat(item.tags || [])
                            }));
                        }
                    }
                } catch (e) {
                    addLog(`Channels YAML 解析失败，回退到 CSV 格式: ${e.message}`, 'warn');
                }

                // CSV 回退 (URL,apiKey[,name[,type[,tags]]])
                const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
                return lines.map(line => {
                    const parts = line.split(',');
                    const url = parts[0]?.trim();
                    const apiKey = parts[1]?.trim() || '';
                    const name = parts[2]?.trim() || '';
                    const type = parts[3]?.trim() || '';
                    const tagsStr = parts[4]?.trim() || '';
                    const tags = tagsStr ? tagsStr.split('|').map(t => t.trim()) : [];
                    return { url: url, keys: [apiKey], name: name, type: type, tags: tags };
                });
            };

            // 解析 Model 文本 (仅支持 YAML)
            const parseModelInput = (text) => {
                if (!text) return null;
                try {
                    const parsed = jsyaml.load(text);
                    if (typeof parsed === 'object' && parsed !== null) {
                        // 兼容用户包裹在 models: 下，或者直接写 providers:
                        return parsed.models ? parsed.models : parsed;
                    }
                } catch (e) {
                    throw new Error("Models YAML 解析失败: " + e.message);
                }
                return null;
            };

            const getPermutations = (arr) => {
                if (arr.length <= 1) return [arr];
                if (arr.length > 4) {
                    // 超过4个元素时，返回固定数量避免阶乘爆炸 (4! = 24)
                    const limit = 24;
                    let result = [];
                    for (let i = 0; i < Math.min(arr.length, 12); i++) {
                        let current = arr[i];
                        let remaining = arr.slice(0, i).concat(arr.slice(i + 1));
                        let remainingPerms = getPermutations(remaining);
                        for (let perm of remainingPerms) {
                            if (result.length >= limit) break;
                            result.push([current].concat(perm));
                        }
                        if (result.length >= limit) break;
                    }
                    return result;
                }
                let result = [];
                for (let i = 0; i < arr.length; i++) {
                    let current = arr[i];
                    let remaining = arr.slice(0, i).concat(arr.slice(i + 1));
                    let remainingPerms = getPermutations(remaining);
                    for (let perm of remainingPerms) {
                        result.push([current].concat(perm));
                    }
                }
                return result;
            };

            const generateAssociations = (modelIdStr) => {
                let cleanId = modelIdStr.split('/').pop();
                let parts = cleanId.split('-');
                let components = [];

                for (let i = 0; i < parts.length; i++) {
                    let curr = parts[i];
                    // 规则1: {digit}-{digit} 转 {digit}.{digit} (如 4-5 转 4.5)
                    if (/^\d+$/.test(curr) && i + 1 < parts.length && /^\d+$/.test(parts[i + 1])) {
                        components.push(`${curr}.${parts[i + 1]}`);
                        i++;
                    }
                    // 规则2: 单个数字或字母+单个数字不排末尾，与后面组件用 - 连接
                    else if ((/^\d$/.test(curr) || /^[a-zA-Z]\d$/.test(curr)) && i + 1 < parts.length) {
                        // 【修复】如果是单个数字，加上前缀 - 防止错误匹配 (如 .*5 匹配到 4.5)
                        let prefix = /^\d$/.test(curr) ? '-' : '';
                        components.push(`${prefix}${curr}-${parts[i + 1]}`);
                        i++;
                    }
                    // 规则3: 其他正常保留
                    else {
                        // 【修复】如果是末尾的单个数字，同样加上前缀 -
                        if (/^\d$/.test(curr)) {
                            components.push(`-${curr}`);
                        } else {
                            components.push(curr);
                        }
                    }
                }

                let base = components[0];
                let rest = components.slice(1);
                let perms = getPermutations(rest);

                let patterns = perms.map(p => {
                    return '.*' + [base, ...p].join('.*');
                });

                patterns = [...new Set(patterns)];
                let priority = Math.max(5, patterns.length);

                return patterns.map(p => ({
                    type: "regex",
                    priority: priority,
                    disabled: false,
                    channelModel: null,
                    channelRegex: null,
                    regex: { pattern: p },
                    modelId: null,
                    channelTagsModel: null,
                    channelTagsRegex: null
                }));
            };

            const formatModel = (mId, modelData, providerData, developer, now) => {
                let cleanId = mId.split('/').pop();
                let icon = providerData.lobeIcon ? providerData.lobeIcon.split('.')[0] : providerData.name;
                let cost = modelData.cost || {};

                return {
                    id: 0,
                    created_at: now,
                    updated_at: now,
                    developer: developer,
                    model_id: cleanId,
                    type: "chat",
                    name: modelData.name || cleanId,
                    icon: icon,
                    group: modelData.family || "",
                    model_card: {
                        reasoning: {
                            supported: !!modelData.reasoning,
                            default: !!modelData.reasoning
                        },
                        toolCall: !!modelData.tool_call,
                        temperature: !!modelData.temperature,
                        modalities: modelData.modalities || { input: ["text"], output: ["text"] },
                        vision: modelData.modalities && modelData.modalities.input ? modelData.modalities.input.includes("image") : false,
                        cost: {
                            input: cost.input || 0,
                            output: cost.output || 0,
                            cacheRead: cost.cache_read || 0,
                            cacheWrite: cost.cache_write || 0
                        },
                        limit: modelData.limit || { context: 0, output: 0 },
                        knowledge: modelData.knowledge || "",
                        releaseDate: modelData.release_date || "",
                        lastUpdated: modelData.last_updated || ""
                    },
                    settings: {
                        associations: generateAssociations(cleanId)
                    },
                    status: "enabled",
                    remark: ""
                };
            };

            const processModels = async (modelsConfig) => {
                if (!modelsConfig || !modelsConfig.includes) return [];

                addLog('开始获取 LLM 元数据...', 'info');
                let metadata;
                try {
                    const res = await fetch('https://llm-metadata.pages.dev/api/all.json');
                    if (!res.ok) throw new Error('Cloudflare Pages HTTP error');
                    metadata = await res.json();
                    addLog('成功从 Cloudflare Pages 获取 LLM 元数据', 'success');
                } catch (e) {
                    addLog('Cloudflare Pages 获取失败，尝试 GitHub Pages...', 'warn');
                    try {
                        const res = await fetch('https://basellm.github.io/llm-metadata/api/all.json');
                        metadata = await res.json();
                        addLog('成功从 GitHub Pages 获取 LLM 元数据', 'success');
                    } catch (e2) {
                        addLog('获取 LLM 元数据失败: ' + e2.message, 'error');
                        return [];
                    }
                }

                const providersList = modelsConfig.providers || Object.keys(metadata);
                const excludes = (modelsConfig.excludes || []).map(e => {
                    try { return new RegExp(e, 'i'); } catch (err) { return null; }
                }).filter(Boolean);

                let matchedModels = new Map();
                const now = getIsoTime();

                for (let rule of modelsConfig.includes) {
                    let patternStr = rule.trim();
                    let ruleProvider = null;

                    // 安全提取 provider，防止带有 {2,} 的正则被逗号错误截断
                    const match = rule.match(/^(.*),([a-zA-Z0-9_-]+)$/);
                    if (match) {
                        patternStr = match[1].trim();
                        ruleProvider = match[2].trim();
                    }

                    let regex;
                    try {
                        regex = new RegExp(patternStr, 'i');
                    } catch (e) {
                        addLog(`跳过无效的正则表达式: ${patternStr}`, 'error');
                        continue;
                    }

                    let foundAny = false;
                    const searchAndAdd = (providerKey, overrideDeveloper) => {
                        let pData = metadata[providerKey];
                        if (!pData || !pData.models) return false;
                        let foundInProvider = false;
                        for (let mId in pData.models) {
                            if (regex.test(mId)) {
                                if (excludes.some(ex => ex.test(mId))) continue;
                                foundAny = true;
                                foundInProvider = true;
                                if (!matchedModels.has(mId)) {
                                    let developer = overrideDeveloper || providerKey;
                                    matchedModels.set(mId, formatModel(mId, pData.models[mId], pData, developer, now));
                                }
                            }
                        }
                        return foundInProvider;
                    };

                    if (ruleProvider) {
                        searchAndAdd(ruleProvider, ruleProvider);
                        if (!foundAny) {
                            for (let p of providersList) {
                                searchAndAdd(p, ruleProvider);
                            }
                        }
                    } else {
                        for (let p of providersList) {
                            searchAndAdd(p, null);
                        }
                    }
                }

                let finalModelsRaw = Array.from(matchedModels.values());

                // --- 新增：根据 model_id 进行去重 ---
                let uniqueModels = [];
                let seenModelIds = new Set();
                for (let model of finalModelsRaw) {
                    if (!seenModelIds.has(model.model_id)) {
                        seenModelIds.add(model.model_id);
                        uniqueModels.push(model);
                    } else {
                        addLog(`发现重复模型 [${model.model_id}]，已自动去重`, 'warn');
                    }
                }

                // --- 新增：处理 variants 变体 ---
                if (modelsConfig.variants && Array.isArray(modelsConfig.variants)) {
                    let newVariants = [];
                    for (let rule of modelsConfig.variants) {
                        let parts = rule.split(',');
                        if (parts.length < 2) continue;
                        let patternStr = parts[0].trim();
                        let variantSuffix = parts[1].trim();

                        let regex;
                        try {
                            regex = new RegExp(patternStr, 'i');
                        } catch (e) {
                            addLog(`跳过无效的 variant 正则表达式: ${patternStr}`, 'error');
                            continue;
                        }

                        for (let model of uniqueModels) {
                            if (regex.test(model.model_id)) {
                                let newModelId = `${model.model_id}-${variantSuffix}`;
                                if (!seenModelIds.has(newModelId)) {
                                    seenModelIds.add(newModelId);
                                    let newModel = JSON.parse(JSON.stringify(model));
                                    newModel.model_id = newModelId;
                                    newModel.name = `${model.name} ${variantSuffix}`;
                                    newModel.settings.associations = generateAssociations(newModelId);
                                    newVariants.push(newModel);
                                    addLog(`生成模型变体: ${newModelId}`, 'info');
                                }
                            }
                        }
                    }
                    uniqueModels.push(...newVariants);
                }
                // -----------------------------------

                let finalModels = uniqueModels;
                finalModels.forEach((m, idx) => m.id = idx + 1);
                addLog(`Models 匹配完毕，共生成 ${finalModels.length} 个模型配置`, 'success');
                return finalModels;
            };

            const fetchWithTimeout = async (resource, options, timeout) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(resource, { ...options, signal: controller.signal });
                    clearTimeout(id);
                    return response;
                } catch (error) {
                    clearTimeout(id);
                    throw error;
                }
            };

            const applyProxy = (url) => {
                const proxyPrefix = proxyUrlInput.value.trim();
                if (!proxyPrefix) return url;
                return proxyPrefix.endsWith('=') ? proxyPrefix + encodeURIComponent(url) : proxyPrefix + url;
            };

            const processChannels = async (channelConfigs, errors) => {
                const tasks = [];
                channelConfigs.forEach((config, configIndex) => {
                    if (!config.url) return;
                    let apiKeys = config.keys.length > 0 ? config.keys : [''];
                    let baseName = config.name ? config.name : extractName(config.url);
                    apiKeys.forEach(apiKey => {
                        tasks.push({ url: config.url, apiKey: apiKey, baseName: baseName, explicitType: config.type, initialTags: config.tags, configIndex: configIndex });
                    });
                });

                if (tasks.length === 0) return { channels: [], successCount: 0, failCount: 0 };

                let usedNames = new Set();
                let totalTasks = tasks.length;
                let completedTasks = 0;
                let successCount = 0;
                let failCount = 0;

                progressContainer.classList.remove('hidden');

                const promises = tasks.map(async (task) => {
                    let generatedChannels = [];
                    let baseUrl = task.url.startsWith('http') ? task.url : 'https://' + task.url;
                    baseUrl = baseUrl.replace(/\/$/, '');
                    if (baseUrl.endsWith('/v1')) baseUrl = baseUrl.substring(0, baseUrl.length - 3);
                    if (baseUrl.endsWith('/v1beta')) baseUrl = baseUrl.substring(0, baseUrl.length - 7);

                    let targetUrl = baseUrl + '/v1/models';
                    let needsProxy = false;
                    const timeouts = [10000, 20000, 30000];
                    const options = { headers: { 'Authorization': `Bearer ${task.apiKey}`, 'Content-Type': 'application/json' } };

                    try {
                        let modelsData = null;
                        for (let i = 0; i < timeouts.length; i++) {
                            const timeout = timeouts[i];
                            if (i > 0) addLog(`[${task.baseName}] 请求超时，发起第 ${i} 次重连，等待 ${timeout / 1000}s...`, 'warn');

                            try {
                                let currentUrl = needsProxy ? applyProxy(targetUrl) : targetUrl;
                                try {
                                    const response = await fetchWithTimeout(currentUrl, options, timeout);
                                    if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
                                    modelsData = await response.json();
                                    break;
                                } catch (err) {
                                    if (err.name !== 'AbortError' && !needsProxy && useProxyCheckbox.checked && err instanceof TypeError) {
                                        needsProxy = true;
                                        addLog(`[${task.baseName}] 遇到跨域拦截，已切换至跨域代理重新请求...`, 'warn');
                                        currentUrl = applyProxy(targetUrl);
                                        const proxyRes = await fetchWithTimeout(currentUrl, options, timeout);
                                        if (!proxyRes.ok) throw new Error(`HTTP ${proxyRes.status} ${proxyRes.statusText}`);
                                        modelsData = await proxyRes.json();
                                        break;
                                    } else {
                                        throw err;
                                    }
                                }
                            } catch (outerErr) {
                                if (outerErr.name === 'AbortError') {
                                    if (i === timeouts.length - 1) throw new Error(`连续 3 次请求超时，已放弃连接。`);
                                } else {
                                    throw outerErr;
                                }
                            }
                        }

                        successCount++;
                        addLog(`[${task.baseName}] 获取渠道模型成功!`, 'success');

                        if (modelsData && modelsData.data && Array.isArray(modelsData.data)) {
                            const typeGroups = {};

                            modelsData.data.forEach(m => {
                                const modelId = m.id;
                                let type = 'openai';

                                // 如果用户显式指定了 Type，则跳过推断逻辑
                                if (task.explicitType) {
                                    type = task.explicitType;
                                } else {
                                    const channel = (m.owned_by || '').toLowerCase();
                                    const endpointTypes = m.supported_endpoint_types || [];

                                    if (['openai', 'anthropic', 'gemini'].includes(channel)) {
                                        type = channel;
                                    } else {
                                        const hasAnthropic = endpointTypes.includes('anthropic');
                                        const hasOpenai = endpointTypes.includes('openai');
                                        const hasGemini = endpointTypes.includes('gemini');
                                        const modelLower = modelId.toLowerCase();

                                        if (hasAnthropic && hasOpenai && modelLower.includes('claude')) type = 'anthropic';
                                        else if (hasGemini && hasOpenai && modelLower.includes('gemini')) type = 'gemini';
                                        else type = 'openai';
                                    }

                                    if (type === 'openai') {
                                        const modelLower = modelId.toLowerCase();
                                        let isCodex = modelLower.includes('codex');
                                        let isGpt5OrAbove = false;
                                        const match = modelId.match(/gpt-(\d+)/i);
                                        if (match && parseInt(match[1]) >= 5) isGpt5OrAbove = true;
                                        if (isCodex || isGpt5OrAbove) type = 'openai_responses';
                                    }
                                }

                                if (!typeGroups[type]) typeGroups[type] = new Set();
                                typeGroups[type].add(modelId);
                            });

                            const now = getIsoTime();

                            for (const [type, modelsSet] of Object.entries(typeGroups)) {
                                if (modelsSet.size === 0) continue;
                                const supported_models = Array.from(modelsSet).sort();

                                let safeUrl = task.url.startsWith('http') ? task.url : 'https://' + task.url;
                                let origin = new URL(safeUrl).origin;
                                let finalBaseUrl = origin;

                                // 核心：根据 CHANNEL_SUFFIXES 映射表自动拼接后缀
                                if (CHANNEL_SUFFIXES.hasOwnProperty(type)) {
                                    finalBaseUrl += CHANNEL_SUFFIXES[type];
                                } else {
                                    // 降级回退逻辑
                                    if (type === 'openai' || type === 'openai_responses') finalBaseUrl += '/v1';
                                    else if (type === 'gemini') finalBaseUrl += '/v1beta';
                                }

                                let suffix = type === 'openai_responses' ? 'codex' : type === 'anthropic' ? 'claude' : type;
                                let finalName = `${task.baseName} (${suffix})`;

                                if (usedNames.has(finalName)) {
                                    let i = 1;
                                    while (usedNames.has(`${finalName} (${i})`)) i++;
                                    finalName = `${finalName} (${i})`;
                                }
                                usedNames.add(finalName);

                                let finalTags = new Set(task.initialTags.length > 0 ? task.initialTags : ['公益站']);
                                const keywords = ['glm', 'kimi', 'minimax', 'qwen', 'deepseek', 'gpt', 'claude', 'gemini', 'grok'];
                                let hasOther = false;

                                supported_models.forEach(m => {
                                    const mLower = m.toLowerCase();
                                    let matched = false;
                                    keywords.forEach(kw => {
                                        if (mLower.includes(kw)) {
                                            finalTags.add(kw);
                                            matched = true;
                                        }
                                    });
                                    if (!matched) hasOther = true;
                                });
                                if (hasOther) finalTags.add('other');

                                const default_test_model = supported_models[Math.floor(Math.random() * supported_models.length)];

                                generatedChannels.push({
                                    id: 0, created_at: now, updated_at: now, type: type, base_url: finalBaseUrl,
                                    name: finalName, status: "enabled", supported_models: supported_models,
                                    tags: Array.from(finalTags), default_test_model: default_test_model,
                                    policies: { stream: "unlimited" }, ordering_weight: 50, remark: "", edges: {},
                                    credentials: { apiKey: task.apiKey, gcp: { region: "", projectID: "", jsonData: "" } },
                                    _configIndex: task.configIndex
                                });
                            }
                        }
                    } catch (e) {
                        failCount++;
                        let keyPreview = task.apiKey ? task.apiKey.substring(0, 8) + '...' : '空Key';
                        addLog(`[${task.baseName}] 获取失败: ${e.message}`, 'error');
                        errors.push(`[${task.url}] Key: ${keyPreview} 获取失败: ${e.message}`);
                    } finally {
                        completedTasks++;
                        let percent = Math.round((completedTasks / totalTasks) * 100);
                        progressBar.style.width = `${percent}%`;
                        progressText.textContent = `${percent}%`;
                    }
                    return generatedChannels;
                });

                // 并发控制：限制同时进行的请求数量
                const CONCURRENCY_LIMIT = 5;
                const results = [];
                for (let i = 0; i < promises.length; i += CONCURRENCY_LIMIT) {
                    const batch = promises.slice(i, i + CONCURRENCY_LIMIT);
                    const batchResults = await Promise.all(batch);
                    results.push(...batchResults);
                }

                let finalChannels = [];
                results.forEach(res => { if (res) finalChannels.push(...res); });
                finalChannels.sort((a, b) => a._configIndex - b._configIndex);
                finalChannels.forEach((channel, idx) => {
                    channel.id = idx + 1;
                    delete channel._configIndex;
                });

                return { channels: finalChannels, successCount, failCount };
            };

            // 智能生成 Oh My OpenCode 配置文件
            const generateOhMyOpenCodeConfig = (opencodeConfig) => {
                if (!opencodeConfig || !opencodeConfig.provider) return null;

                const availableModels = [];
                for (const [providerKey, providerData] of Object.entries(opencodeConfig.provider)) {
                    if (!providerData.models) continue;
                    for (const [modelId, modelData] of Object.entries(providerData.models)) {
                        availableModels.push({
                            fullId: `${providerKey}/${modelId}`,
                            model_id: modelId,
                            variants: modelData.variants ? Object.keys(modelData.variants) : []
                        });
                    }
                }

                if (availableModels.length === 0) return null;

                // 智能匹配模型并处理 Variant 降级
                const findModel = (patterns, preferredVariant, temp) => {
                    for (let pattern of patterns) {
                        const regex = new RegExp(pattern, 'i');
                        const matched = availableModels.find(m => regex.test(m.model_id));
                        if (matched) {
                            let result = { model: matched.fullId };
                            if (temp !== undefined) result.temperature = temp;

                            if (preferredVariant) {
                                if (matched.variants.includes(preferredVariant)) {
                                    result.variant = preferredVariant;
                                } else if ((preferredVariant === 'max' || preferredVariant === 'xhigh') && matched.variants.includes('high')) {
                                    result.variant = 'high';
                                }
                            }
                            return result;
                        }
                    }
                    return undefined;
                };

                const config = {
                    "$schema": "https://raw.githubusercontent.com/code-yeongyu/oh-my-opencode/master/assets/oh-my-opencode.schema.json",
                    "agents": {},
                    "categories": {}
                };

                // Agents 分配 (优先匹配高版本，最后兜底泛匹配)
                const sisyphus = findModel(['claude.*opus.*4.6', 'kimi.*k2.5', 'glm.*4.7', 'gpt.*5.3.*codex', 'gemini.*3.1.*pro', 'gemini.*3.*pro', 'claude.*opus', 'kimi', 'glm', 'gpt.*codex', 'gemini.*pro'], null, 0.1);
                if (sisyphus) config.agents.sisyphus = sisyphus;

                const atlas = findModel(['claude.*sonnet.*4.5', 'kimi.*k2.5', 'gpt.*5.2', 'gemini.*3.1.*pro', 'gemini.*3.*pro', 'claude.*sonnet', 'kimi', 'gemini.*pro'], null, 0.1);
                if (atlas) config.agents.atlas = atlas;

                const prometheus = findModel(['claude.*opus.*4.6', 'kimi.*k2.5', 'gpt.*5.2', 'claude.*opus', 'kimi'], null, 0.1);
                if (prometheus) config.agents.prometheus = prometheus;

                const metis = findModel(['claude.*opus.*4.6', 'kimi.*k2.5', 'gpt.*5.2', 'claude.*opus', 'kimi'], 'max', 0.3);
                if (metis) config.agents.metis = metis;

                const momus = findModel(['gpt.*5.2', 'claude.*opus.*4.6', 'gemini.*3.1.*pro', 'gemini.*3.*pro', 'claude.*opus', 'gemini.*pro'], 'medium', 0.1);
                if (momus) config.agents.momus = momus;

                const hephaestus = findModel(['gpt.*5.3.*codex', 'gpt.*5.2.*codex', 'gpt.*codex'], null, 0.1);
                if (hephaestus) config.agents.hephaestus = hephaestus;

                const oracle = findModel(['gpt.*5.2', 'gemini.*3.1.*pro', 'gemini.*3.*pro', 'claude.*opus.*4.6', 'claude.*opus', 'gemini.*pro'], 'high', 0.1);
                if (oracle) config.agents.oracle = oracle;

                const librarian = findModel(['glm.*4.7', 'gpt.*5.3.*codex.*spark', 'gemini.*3.*flash', 'glm', 'gemini.*flash']);
                if (librarian) config.agents.librarian = librarian;

                const explore = findModel(['gpt.*5.3.*codex.*spark', 'grok.*code.*fast.*1', 'claude.*haiku.*4.5', 'gpt.*5.*mini', 'gpt.*5.*nano', 'grok.*code.*fast', 'claude.*haiku']);
                if (explore) config.agents.explore = explore;

                const multimodalLooker = findModel(['gemini.*3.1.*pro', 'gemini.*3.*pro', 'gemini.*3.*flash', 'kimi.*k2.5', 'gemini.*pro', 'gemini.*flash', 'kimi']);
                if (multimodalLooker) config.agents["multimodal-looker"] = multimodalLooker;

                // Categories 分配
                const quick = findModel(['gpt.*5.3.*codex.*spark', 'claude.*haiku.*4.5', 'gemini.*3.*flash', 'gpt.*5.*nano', 'claude.*haiku', 'gemini.*flash'], null, 0.1);
                if (quick) config.categories.quick = quick;

                const deep = findModel(['gpt.*5.3.*codex', 'claude.*opus.*4.6', 'gemini.*3.1.*pro', 'gemini.*3.*pro', 'gpt.*codex', 'claude.*opus', 'gemini.*pro'], 'medium', 0.1);
                if (deep) config.categories.deep = deep;

                const ultrabrain = findModel(['gpt.*5.3.*codex', 'gpt.*5.2.*codex', 'gpt.*codex'], 'xhigh', 0.1);
                if (ultrabrain) config.categories.ultrabrain = ultrabrain;

                const visual = findModel(['gemini.*3.1.*pro', 'gemini.*3.*pro', 'glm.*5', 'claude.*opus.*4.6', 'gemini.*pro', 'glm', 'claude.*opus'], null, 0.1);
                if (visual) config.categories["visual-engineering"] = visual;

                const writing = findModel(['gemini.*3.1.*pro', 'gemini.*3.*pro', 'glm.*4.7', 'kimi.*k2.5', 'gemini.*3.*flash', 'claude.*sonnet.*4.5', 'gemini.*pro', 'glm', 'kimi', 'gemini.*flash', 'claude.*sonnet'], null, 0.2);
                if (writing) config.categories.writing = writing;

                const unspecLow = findModel(['claude.*sonnet.*4.5', 'claude.*sonnet'], null, 0.1);
                if (unspecLow) config.categories["unspecified-low"] = unspecLow;

                const unspecHigh = findModel(['claude.*opus.*4.6', 'claude.*opus'], 'max', 0.1);
                if (unspecHigh) config.categories["unspecified-high"] = unspecHigh;

                if (Object.keys(config.agents).length === 0) delete config.agents;
                if (Object.keys(config.categories).length === 0) delete config.categories;

                return config;
            };

            convertBtn.addEventListener('click', async () => {
                const channelText = channelInput.value.trim();
                const modelText = modelInput.value.trim();
                const apiKeyText = apiKeyInput.value.trim();

                if (!channelText && !modelText && !apiKeyText) {
                    alert("请至少填写 Channels、Models 或 API Keys 中的一项配置！");
                    return;
                }

                convertBtn.disabled = true;
                loadingIcon.classList.remove('hidden');
                btnText.textContent = '正在处理数据...';

                logContainer.classList.remove('hidden');
                logList.innerHTML = '';
                addLog('任务已启动，开始解析配置...', 'info');

                summaryContainer.classList.add('hidden');
                errorContainer.classList.add('hidden');

                // 隐藏所有输出容器
                allOutputsContainer.classList.add('hidden');
                allOutputsContainer.classList.remove('flex');
                outputContainer.classList.add('hidden');
                outputContainer.classList.remove('flex');
                opencodeOutputContainer.classList.add('hidden');
                opencodeOutputContainer.classList.remove('flex');
                ohMyOpencodeOutputContainer.classList.add('hidden');
                ohMyOpencodeOutputContainer.classList.remove('flex');

                errorList.innerHTML = '';
                outputJson.value = '';
                opencodeOutputJson.value = '';
                ohMyOpencodeOutputJson.value = '';

                let channelConfigs = [];
                let modelsConfig = null;
                let apiKeysConfig = [];
                const errors = [];

                try {
                    channelConfigs = parseChannelInput(channelText);
                    if (modelText) {
                        modelsConfig = parseModelInput(modelText);
                    }
                    apiKeysConfig = parseApiKeysInput(apiKeyText);
                } catch (e) {
                    addLog(e.message, 'error');
                    resetUI();
                    return;
                }

                try {
                    const [channelsResult, finalModels] = await Promise.all([
                        processChannels(channelConfigs, errors),
                        processModels(modelsConfig)
                    ]);

                    const finalApiKeys = processApiKeys(apiKeysConfig);
                    if (finalApiKeys.length > 0) {
                        addLog(`成功生成 ${finalApiKeys.length} 个 API Key 配置`, 'success');
                    }

                    elSuccessCount.textContent = channelsResult.successCount;
                    elFailCount.textContent = channelsResult.failCount;
                    elChannelCount.textContent = channelsResult.channels.length;
                    elModelCount.textContent = finalModels.length;
                    elApiKeyCount.textContent = finalApiKeys.length;
                    summaryContainer.classList.remove('hidden');

                    if (errors.length > 0) {
                        errors.forEach(err => {
                            const li = document.createElement('li');
                            li.textContent = err;
                            errorList.appendChild(li);
                        });
                        errorContainer.classList.remove('hidden');
                    }

                    // --- 生成 AxonHub JSON ---
                    const finalOutput = {
                        version: "1.1",
                        timestamp: getIsoTime(),
                        channels: channelsResult.channels,
                        models: finalModels,
                        api_keys: finalApiKeys
                    };
                    outputJson.value = JSON.stringify(finalOutput, null, 4);

                    allOutputsContainer.classList.remove('hidden');
                    allOutputsContainer.classList.add('flex');
                    outputContainer.classList.remove('hidden');
                    outputContainer.classList.add('flex');

                    // --- 生成 OpenCode JSON (官方标准结构) ---
                    let opencodeConfig = null;
                    if (finalModels.length > 0) {
                        opencodeConfig = {
                            "$schema": "https://opencode.ai/config.json",
                            "autoupdate": false,
                            "share": "disabled",
                            "plugin": [
                                "opencode-axonhub-tracing"
                            ],
                            "provider": {}
                        };

                        // 查找 name 为 opencode 的 apiKey
                        const opencodeKeyObj = finalApiKeys.find(k => k.name === 'opencode');
                        const opencodeKey = opencodeKeyObj ? opencodeKeyObj.key : undefined;

                        finalModels.forEach(model => {
                            let dev = (model.developer || '').toLowerCase();
                            if (dev === 'openai_responses') dev = 'openai';

                            const pInfo = OPENCODE_PROVIDER_MAP[dev] || {
                                prefix: dev,
                                name: dev.charAt(0).toUpperCase() + dev.slice(1),
                                npm: '@ai-sdk/openai-compatible',
                                url: 'http://localhost:8090/v1'
                            };

                            const providerKey = `axonhub-${pInfo.prefix}`;

                            if (!opencodeConfig.provider[providerKey]) {
                                opencodeConfig.provider[providerKey] = {
                                    name: `AxonHub ${pInfo.name}`,
                                    npm: pInfo.npm,
                                    options: {
                                        baseURL: pInfo.url
                                    },
                                    models: {}
                                };
                                if (opencodeKey) {
                                    opencodeConfig.provider[providerKey].options.apiKey = opencodeKey;
                                }
                            }

                            // 提取模型基本数据
                            let modelEntry = {
                                name: model.name,
                                limit: model.model_card.limit,
                                modalities: model.model_card.modalities
                            };

                            // 智能注入 Variants (仅当支持 reasoning 时)
                            if (model.model_card && model.model_card.reasoning && model.model_card.reasoning.supported) {
                                if (pInfo.npm === '@ai-sdk/openai') {
                                    modelEntry.variants = {};

                                    // 判断是否需要注入 xhigh
                                    let includeXHigh = false;
                                    if (model.model_id.toLowerCase().includes('codex')) {
                                        includeXHigh = true;
                                    } else {
                                        const match = model.model_id.match(/gpt-(\d+(?:\.\d+)?)/i);
                                        if (match && parseFloat(match[1]) >= 5.2) {
                                            includeXHigh = true;
                                        }
                                    }

                                    // 严格按照 xhigh -> high -> medium -> low 降序插入
                                    if (includeXHigh) {
                                        modelEntry.variants.xhigh = { reasoningEffort: "xhigh", reasoningSummary: "auto", textVerbosity: "high" };
                                    }
                                    modelEntry.variants.high = { reasoningEffort: "high", reasoningSummary: "auto", textVerbosity: "high" };
                                    modelEntry.variants.medium = { reasoningEffort: "medium", reasoningSummary: "auto", textVerbosity: "medium" };
                                    modelEntry.variants.low = { reasoningEffort: "low", reasoningSummary: "auto", textVerbosity: "low" };

                                } else if (pInfo.npm === '@ai-sdk/google') {
                                    modelEntry.variants = {
                                        high: { thinkingConfig: { includeThoughts: true, thinkingLevel: "high" } },
                                        medium: { thinkingConfig: { includeThoughts: true, thinkingLevel: "medium" } },
                                        low: { thinkingConfig: { includeThoughts: true, thinkingLevel: "low" } }
                                    };
                                } else if (pInfo.npm === '@ai-sdk/anthropic') {
                                    modelEntry.variants = {
                                        high: { thinking: { budgetTokens: 18000, type: "enabled" } },
                                        medium: { thinking: { budgetTokens: 13000, type: "enabled" } },
                                        low: { thinking: { budgetTokens: 5000, type: "enabled" } }
                                    };
                                }
                            }

                            opencodeConfig.provider[providerKey].models[model.model_id] = modelEntry;
                        });

                        opencodeOutputJson.value = JSON.stringify(opencodeConfig, null, 4);
                        opencodeOutputContainer.classList.remove('hidden');
                        opencodeOutputContainer.classList.add('flex');
                        addLog('成功生成 OpenCode 配置文件', 'success');

                        // --- 生成 Oh My OpenCode JSON ---
                        const ohMyOpencodeConfig = generateOhMyOpenCodeConfig(opencodeConfig);
                        if (ohMyOpencodeConfig) {
                            ohMyOpencodeOutputJson.value = JSON.stringify(ohMyOpencodeConfig, null, 4);
                            ohMyOpencodeOutputContainer.classList.remove('hidden');
                            ohMyOpencodeOutputContainer.classList.add('flex');
                            addLog('成功生成 Oh My OpenCode 配置文件', 'success');
                        }
                    }

                    addLog('所有转换任务完成！', 'success');
                } catch (e) {
                    addLog(`执行过程中发生严重错误: ${e.message}`, 'error');
                }

                resetUI();
            });

            function resetUI() {
                convertBtn.disabled = false;
                loadingIcon.classList.add('hidden');
                btnText.textContent = '开始转换';
                setTimeout(() => { progressContainer.classList.add('hidden'); }, 1500);
            }

            copyBtn.addEventListener('click', () => {
                outputJson.select();
                navigator.clipboard.writeText(outputJson.value).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '已复制!';
                    copyBtn.classList.replace('bg-green-600', 'bg-teal-600');
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.replace('bg-teal-600', 'bg-green-600');
                    }, 2000);
                }).catch(err => {
                    alert('复制失败，请手动复制');
                });
            });

            copyOpencodeBtn.addEventListener('click', () => {
                opencodeOutputJson.select();
                navigator.clipboard.writeText(opencodeOutputJson.value).then(() => {
                    const originalText = copyOpencodeBtn.textContent;
                    copyOpencodeBtn.textContent = '已复制!';
                    copyOpencodeBtn.classList.replace('bg-purple-600', 'bg-pink-600');
                    setTimeout(() => {
                        copyOpencodeBtn.textContent = originalText;
                        copyOpencodeBtn.classList.replace('bg-pink-600', 'bg-purple-600');
                    }, 2000);
                }).catch(err => {
                    alert('复制失败，请手动复制');
                });
            });

            copyOhMyOpencodeBtn.addEventListener('click', () => {
                ohMyOpencodeOutputJson.select();
                navigator.clipboard.writeText(ohMyOpencodeOutputJson.value).then(() => {
                    const originalText = copyOhMyOpencodeBtn.textContent;
                    copyOhMyOpencodeBtn.textContent = '已复制!';
                    copyOhMyOpencodeBtn.classList.replace('bg-indigo-600', 'bg-pink-600');
                    setTimeout(() => {
                        copyOhMyOpencodeBtn.textContent = originalText;
                        copyOhMyOpencodeBtn.classList.replace('bg-pink-600', 'bg-indigo-600');
                    }, 2000);
                }).catch(err => {
                    alert('复制失败，请手动复制');
                });
            });
        });
    </script>
</body>
</html>
